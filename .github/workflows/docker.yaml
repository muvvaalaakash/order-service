name: Build, Scan & Push Secure Image (Invoice)

on:
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Docker Image Tag (e.g., v1.0.5)'
        required: true
        default: 'latest'

env:
  IMAGE_NAME: order

jobs:
  docker-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Version
        run: |
          VERSION="${{ github.event.inputs.docker_tag }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # Build
      - name: Build Image
        run: |
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .

      # Install Trivy
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
          | sudo sh -s -- -b /usr/local/bin

      # Scan (FAIL if vuln)
      - name: Trivy Scan
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL $IMAGE_NAME:${{ env.VERSION }}

      # Generate HTML report
      - name: Generate Report
        run: |
          mkdir -p trivy-templates
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl \
            -o trivy-templates/html.tpl

          trivy image \
            --format template \
            --template "trivy-templates/html.tpl" \
            --output trivy-report.html \
            $IMAGE_NAME:${{ env.VERSION }}

      # Login
      - name: Login DockerHub
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login \
          -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      # Tag & Push
      - name: Push Image
        run: |
          docker tag $IMAGE_NAME:${{ env.VERSION }} \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}

          docker tag $IMAGE_NAME:${{ env.VERSION }} \
          ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:${{ env.VERSION }}
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      # Email
      - name: Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Invoice Scan Report - ${{ env.VERSION }}"
          to: ${{ secrets.MAIL_TO }}
          from: CI Scanner <${{ secrets.EMAIL_USERNAME }}>
          body: |
            Repo   : ${{ github.repository }}
            Commit : ${{ github.sha }}
            Tag    : ${{ env.VERSION }}
            Status : ${{ job.status }}
          attachments: trivy-report.html
